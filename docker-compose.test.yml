version: "3.8"

services:
  postgres_test:
    image: postgres:18-alpine
    container_name: n100_financial_test_db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: financial_test_db
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "test_user", "-d", "financial_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
